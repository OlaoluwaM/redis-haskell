name: hs-redis-clone
version: 0.1.0.0
license: BSD3

language: GHC2021
dependencies:
  - base
  - bytestring # useful to send bytes over the network
  - containers
  - text
  - PyF

default-extensions:
  - TypeApplications
  - ImportQualifiedPost
  - NoStarIsType
  - LambdaCase
  - QuasiQuotes
  - OverloadedStrings
  - NoFieldSelectors
  - OverloadedRecordDot
  - DuplicateRecordFields
  - BlockArguments
  - PackageImports

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints
  - -Wno-unused-top-binds

executables:
  hs-redis-clone-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - hs-redis-clone
      - network # required when using bytestring
      - split
      - network-run
      - stm
      - async

library:
  source-dirs: src
  dependencies:
    - split
    - lens
    - semialign
    - vector
    - errors
    - megaparsec
    - these
    - time
    - mtl # may help with structuring
    - transformers
    - network # required when using bytestring
    - stm # may help with a concurrent database
    - async # may help with concurrency
    - attoparsec
    - parser-combinators
    - unordered-containers

tests:
  hs-redis-clone-test:
    main: Driver.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - hs-redis-clone
      - tasty
      - tasty-hspec
      - tasty-discover
      - QuickCheck
      - tasty-quickcheck
      - hspec
      - tasty-expected-failure
      - attoparsec
      - vector
